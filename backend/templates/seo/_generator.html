{% comment %}F06 — estado inicial: ainda sem SEO gerado.{% endcomment %}
<div class="space-y-5"
     x-data="{ loading: false, context: '' }">

  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-base font-semibold">SEO com IA</h2>
      <p class="text-sm text-muted-foreground mt-0.5">Título, descrição e tags otimizados pelo Claude</p>
    </div>
    <span class="badge badge-secondary">Aguardando geração</span>
  </div>

  {% if job_error %}
  <div class="card border-destructive bg-destructive/5 px-4 py-3 text-sm text-destructive">
    {{ job_error }}
  </div>
  {% endif %}

  <!-- Context input + generate -->
  <div class="card px-4 py-4 flex items-start gap-3">
    <div class="w-9 h-9 rounded-md bg-violet-500/10 flex items-center justify-center shrink-0 mt-0.5">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-violet-500">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-.75-4.75a.75.75 0 001.5 0V8.66l1.95 2.1a.75.75 0 101.1-1.02l-3.25-3.5a.75.75 0 00-1.1 0L6.2 9.74a.75.75 0 101.1 1.02l1.95-2.1v4.59z" clip-rule="evenodd"/>
      </svg>
    </div>
    <div class="flex-1 space-y-3">
      <div>
        <p class="text-sm font-medium mb-1.5">Contexto do vídeo <span class="text-muted-foreground font-normal">(opcional)</span></p>
        <textarea class="textarea" rows="3"
                  x-model="context"
                  placeholder="Descreva o vídeo brevemente para ajudar o Claude a gerar título, descrição e tags mais precisos..."></textarea>
      </div>
      <div class="flex items-center gap-3">
        <button class="btn btn-default btn-sm gap-1.5"
                :disabled="loading"
                :class="loading ? 'opacity-50 cursor-wait' : ''"
                @click="
                  loading = true;
                  const fd = new FormData();
                  fd.append('csrfmiddlewaretoken', document.cookie.match(/csrftoken=([^;]+)/)?.[1] ?? '');
                  fd.append('context', context);
                  fetch('/projects/{{ project.id }}/seo/generate/', { method: 'POST', body: fd })
                    .then(r => r.text())
                    .then(html => {
                      const t = document.getElementById('step-content');
                      if (t) { t.innerHTML = html; htmx.process(t); }
                    })
                    .catch(() => { loading = false; });
                ">
          <svg x-show="!loading" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" fill="currentColor" class="w-3 h-3">
            <path d="M3 3.116a1.5 1.5 0 012.305-1.265l5.706 2.884a1.5 1.5 0 010 2.531L5.305 10.15A1.5 1.5 0 013 8.884V3.116z"/>
          </svg>
          <span x-show="loading" class="w-3 h-3 rounded-full border-2 border-current border-t-transparent animate-spin"></span>
          <span x-text="loading ? 'Gerando...' : 'Gerar com Claude'"></span>
        </button>
        <span class="text-xs text-muted-foreground">claude-opus-4-8 · ~5s</span>
      </div>
    </div>
  </div>

  <!-- Placeholder -->
  <div class="space-y-3 opacity-30 pointer-events-none select-none">
    <div class="card px-4 py-3">
      <div class="h-3 bg-muted rounded w-1/4 mb-3"></div>
      <div class="h-4 bg-muted rounded w-full"></div>
    </div>
    <div class="card px-4 py-3">
      <div class="h-3 bg-muted rounded w-1/4 mb-3"></div>
      <div class="space-y-2">
        <div class="h-3 bg-muted rounded w-full"></div>
        <div class="h-3 bg-muted rounded w-5/6"></div>
        <div class="h-3 bg-muted rounded w-4/6"></div>
      </div>
    </div>
    <div class="card px-4 py-3">
      <div class="h-3 bg-muted rounded w-1/4 mb-3"></div>
      <div class="flex gap-1.5 flex-wrap">
        {% for _ in "12345" %}
        <div class="h-5 w-16 bg-muted rounded-full"></div>
        {% endfor %}
      </div>
    </div>
  </div>

  <!-- Nav -->
  <div class="flex items-center justify-between pt-2">
    <button class="btn btn-ghost btn-sm gap-1.5 cursor-pointer"
            hx-get="/projects/{{ project.id }}/thumbnail/"
            hx-target="#step-content" hx-swap="innerHTML">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5">
        <path fill-rule="evenodd" d="M9.78 11.78a.75.75 0 01-1.06 0L5.47 8.53a.75.75 0 010-1.06l3.25-3.25a.75.75 0 011.06 1.06L7.06 8l2.72 2.72a.75.75 0 010 1.06z" clip-rule="evenodd"/>
      </svg>
      Thumbnails
    </button>
    <button class="btn btn-ghost btn-sm gap-1.5 cursor-pointer"
            hx-get="/projects/{{ project.id }}/publish/"
            hx-target="#step-content" hx-swap="innerHTML">
      Próximo: Publicar
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5">
        <path fill-rule="evenodd" d="M6.22 4.22a.75.75 0 011.06 0l3.25 3.25a.75.75 0 010 1.06l-3.25 3.25a.75.75 0 01-1.06-1.06L9.19 8 6.22 5.03a.75.75 0 010-1.06z" clip-rule="evenodd"/>
      </svg>
    </button>
  </div>
</div>
