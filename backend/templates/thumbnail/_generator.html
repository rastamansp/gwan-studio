<div class="space-y-5">
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-base font-semibold">Thumbnails com IA</h2>
      <p class="text-sm text-muted-foreground mt-0.5">Claude Vision analisa frames e gera 3 variantes</p>
    </div>
    <span class="badge badge-success">Thumbnails geradas</span>
  </div>

  <!-- Generate card -->
  <div class="card">
    <div class="card-content flex items-start gap-3">
      <div class="w-9 h-9 rounded-md bg-violet-500/10 flex items-center justify-center shrink-0 mt-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-violet-500">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-.75-4.75a.75.75 0 001.5 0V8.66l1.95 2.1a.75.75 0 101.1-1.02l-3.25-3.5a.75.75 0 00-1.1 0L6.2 9.74a.75.75 0 101.1 1.02l1.95-2.1v4.59z" clip-rule="evenodd"/>
        </svg>
      </div>
      <div class="flex-1">
        <p class="text-sm font-medium">Claude Vision</p>
        <p class="text-xs text-muted-foreground mt-0.5 leading-relaxed">
          Analisa os frames mais expressivos do <code class="font-mono text-xs bg-muted px-1 py-px rounded">merged.mp4</code>,
          identifica momentos de pico e compõe 3 variantes de thumbnail otimizadas para CTR.
        </p>
        <button class="btn btn-default btn-sm gap-1.5 mt-3"
                hx-post="/projects/{{ project.id }}/thumbnail/generate/"
                hx-target="#thumbnail-result"
                hx-swap="innerHTML">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" fill="currentColor" class="w-3 h-3">
            <path d="M3 3.116a1.5 1.5 0 012.305-1.265l5.706 2.884a1.5 1.5 0 010 2.531L5.305 10.15A1.5 1.5 0 013 8.884V3.116z"/>
          </svg>
          Gerar com Claude Vision
        </button>
      </div>
    </div>
  </div>

  <!-- Picker -->
  <div id="thumbnail-result">
    {% include "thumbnail/_picker.html" %}
  </div>

  <div class="flex items-center justify-between pt-2">
    <button class="btn btn-ghost btn-sm gap-1.5 cursor-pointer"
            hx-get="/projects/{{ project.id }}/export/"
            hx-target="#step-content" hx-swap="innerHTML">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5">
        <path fill-rule="evenodd" d="M9.78 11.78a.75.75 0 01-1.06 0L5.47 8.53a.75.75 0 010-1.06l3.25-3.25a.75.75 0 011.06 1.06L7.06 8l2.72 2.72a.75.75 0 010 1.06z" clip-rule="evenodd"/>
      </svg>
      Export
    </button>
    <button class="btn btn-default btn-sm gap-1.5 cursor-pointer"
            hx-get="/projects/{{ project.id }}/seo/"
            hx-target="#step-content" hx-swap="innerHTML">
      Próximo: SEO
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5">
        <path fill-rule="evenodd" d="M6.22 4.22a.75.75 0 011.06 0l3.25 3.25a.75.75 0 010 1.06l-3.25 3.25a.75.75 0 01-1.06-1.06L9.19 8 6.22 5.03a.75.75 0 010-1.06z" clip-rule="evenodd"/>
      </svg>
    </button>
  </div>
</div>
