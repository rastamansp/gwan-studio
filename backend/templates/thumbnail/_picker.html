<div x-data="{ selected: 'A' }" class="space-y-3">
  <p class="text-sm font-medium">Escolha a variante para publicar</p>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
    {% for variant in thumbnail_variants %}
    <div class="card cursor-pointer transition-all overflow-hidden group"
         :class="selected === '{{ variant.id }}'
           ? 'ring-2 ring-primary ring-offset-2 ring-offset-background shadow-md'
           : 'hover:shadow-md'"
         @click="selected = '{{ variant.id }}'">

      <!-- Gradient thumbnail mock -->
      <div class="aspect-video relative overflow-hidden bg-gradient-to-br {{ variant.gradient }} select-none">
        <div class="absolute inset-0 opacity-30"
             style="background:radial-gradient(circle at 25% 35%,rgba(255,255,255,.25) 0%,transparent 55%),radial-gradient(circle at 75% 75%,rgba(0,0,0,.3) 0%,transparent 55%)"></div>
        <div class="thumb-overlay absolute inset-0"></div>

        <!-- Selected badge -->
        <div x-show="selected === '{{ variant.id }}'" x-cloak class="absolute top-2 left-2 z-10">
          <span class="badge badge-default" style="font-size:0.65rem;padding:0.15rem 0.5rem">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" fill="currentColor" class="w-2.5 h-2.5">
              <path fill-rule="evenodd" d="M10.22 1.47a.75.75 0 01.06 1.06L4.5 9.28 1.72 6.5a.75.75 0 011.06-1.06l1.72 1.72 5.36-6.59a.75.75 0 011.06-.1z" clip-rule="evenodd"/>
            </svg>
            Selecionada
          </span>
        </div>

        <!-- Variant id -->
        <div class="absolute top-2 right-2 z-10">
          <div class="w-6 h-6 rounded-full bg-black/40 backdrop-blur-sm text-white text-xs font-bold flex items-center justify-center">
            {{ variant.id }}
          </div>
        </div>

        <!-- Overlay text -->
        <div class="absolute bottom-0 left-0 right-0 p-3 z-10">
          <p class="text-white font-black text-sm leading-tight drop-shadow-lg">{{ variant.overlay_top }}</p>
          <p class="text-white/80 text-xs font-semibold mt-0.5 drop-shadow">{{ variant.overlay_sub }}</p>
        </div>
      </div>

      <!-- Footer -->
      <div class="p-3">
        <div class="flex items-center justify-between mb-1">
          <span class="text-sm font-semibold">Variante {{ variant.id }}</span>
          <span class="badge badge-secondary" style="font-size:0.65rem">{{ variant.tag }}</span>
        </div>
        <p class="text-xs text-muted-foreground leading-snug">{{ variant.description }}</p>
      </div>
    </div>
    {% endfor %}
  </div>

  <!-- Confirm -->
  <div class="flex items-center justify-between pt-1">
    <p class="text-xs text-muted-foreground">
      Variante <span x-text="selected" class="font-semibold text-foreground"></span> selecionada
    </p>
    <button class="btn btn-success btn-sm gap-1.5"
            hx-post="/projects/{{ project.id }}/thumbnail/select/" @click.stop>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12" fill="currentColor" class="w-3 h-3">
        <path fill-rule="evenodd" d="M10.22 1.47a.75.75 0 01.06 1.06L4.5 9.28 1.72 6.5a.75.75 0 011.06-1.06l1.72 1.72 5.36-6.59a.75.75 0 011.06-.1z" clip-rule="evenodd"/>
      </svg>
      Confirmar variante
    </button>
  </div>
</div>
