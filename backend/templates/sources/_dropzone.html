<div class="space-y-5" x-data="sourceUploader('{{ project.id }}', {{ sources|length }})">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h2 class="text-base font-semibold">Fontes de Footage</h2>
      <p class="text-sm text-muted-foreground mt-0.5">Clipes brutos para o projeto</p>
    </div>
    <span class="badge badge-success" x-show="totalCount > 0">
      <span x-text="totalCount"></span> arquivo<span x-show="totalCount !== 1">s</span>
    </span>
  </div>

  <!-- Dropzone -->
  <label class="dropzone block p-8 text-center cursor-pointer group transition-colors"
         :class="dragging ? 'border-primary bg-primary/5' : ''"
         @dragover.prevent="dragging = true"
         @dragleave.prevent="dragging = false"
         @drop.prevent="dragging = false; handleDrop($event)">
    <div class="flex flex-col items-center gap-3 pointer-events-none">
      <div class="w-12 h-12 rounded-xl bg-muted flex items-center justify-center group-hover:bg-accent transition-colors"
           :class="dragging ? 'bg-primary/10' : ''">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
             class="w-6 h-6 text-muted-foreground group-hover:text-foreground transition-colors">
          <path d="M11.47 1.72a.75.75 0 011.06 0l3 3a.75.75 0 01-1.06 1.06l-1.72-1.72V7.5h-1.5V4.06L9.53 5.78a.75.75 0 01-1.06-1.06l3-3zM11.25 7.5V15a.75.75 0 001.5 0V7.5h3.75a3 3 0 013 3v9a3 3 0 01-3 3h-9a3 3 0 01-3-3v-9a3 3 0 013-3h3.75z"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-medium" x-show="!dragging">
          Arraste clipes ou <span class="text-primary underline underline-offset-4">clique para selecionar</span>
        </p>
        <p class="text-sm font-medium text-primary" x-show="dragging" x-cloak>Solte para enviar</p>
        <p class="text-xs text-muted-foreground mt-1">MP4 · MOV · AVI · MKV · Múltiplos arquivos</p>
      </div>
    </div>
    <input type="file" multiple accept="video/mp4,video/quicktime,video/x-msvideo,video/x-matroska,.mp4,.mov,.avi,.mkv"
           class="hidden" @change="handleFiles($event.target.files)">
  </label>

  <!-- Fila de upload (progress bars) -->
  <template x-if="queue.length > 0">
    <div class="space-y-2">
      <p class="text-xs text-muted-foreground">Enviando...</p>
      <template x-for="u in queue" :key="u.id">
        <div class="card px-4 py-3 space-y-2">
          <div class="flex items-center justify-between gap-2">
            <p class="text-sm font-medium truncate flex-1" x-text="u.name"></p>
            <span class="text-xs font-mono text-muted-foreground shrink-0" x-text="u.sizeFmt"></span>
            <span class="badge shrink-0"
                  :class="u.status === 'error' ? 'badge-destructive' : u.status === 'done' ? 'badge-success' : 'badge-secondary'"
                  x-text="u.status === 'done' ? 'Enviado' : u.status === 'error' ? 'Erro' : u.progress + '%'">
            </span>
          </div>
          <div class="h-1 w-full rounded-full bg-muted overflow-hidden">
            <div class="h-full rounded-full transition-all duration-200"
                 :class="u.status === 'error' ? 'bg-destructive' : 'bg-primary'"
                 :style="`width: ${u.progress}%`"></div>
          </div>
          <p class="text-xs text-destructive" x-show="u.error" x-text="u.error" x-cloak></p>
        </div>
      </template>
    </div>
  </template>

  <!-- Lista de sources (HTMX target) -->
  <div id="source-list">
    {% include "sources/_source_list.html" %}
  </div>

  <!-- Navegação -->
  <div class="flex justify-end pt-1">
    <button class="btn btn-default btn-sm gap-1.5 cursor-pointer"
            hx-get="/projects/{{ project.id }}/merge/"
            hx-target="#step-content"
            hx-swap="innerHTML">
      Próximo: Merge
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5">
        <path fill-rule="evenodd" d="M6.22 4.22a.75.75 0 011.06 0l3.25 3.25a.75.75 0 010 1.06l-3.25 3.25a.75.75 0 01-1.06-1.06L9.19 8 6.22 5.03a.75.75 0 010-1.06z" clip-rule="evenodd"/>
      </svg>
    </button>
  </div>
</div>

<script>
function sourceUploader(projectId, initialCount) {
  return {
    dragging: false,
    queue: [],
    totalCount: initialCount,

    handleDrop(event) {
      this.handleFiles(event.dataTransfer.files);
    },

    handleFiles(files) {
      Array.from(files).forEach(file => this.uploadFile(file));
    },

    uploadFile(file) {
      const id = crypto.randomUUID ? crypto.randomUUID() : Date.now() + Math.random();
      const entry = {
        id,
        name: file.name,
        sizeFmt: this.fmtSize(file.size),
        progress: 0,
        status: 'uploading',
        error: null,
      };
      this.queue.push(entry);

      const formData = new FormData();
      formData.append('file', file);
      formData.append('csrfmiddlewaretoken', this.getCsrf());

      const xhr = new XMLHttpRequest();

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          entry.progress = Math.round((e.loaded / e.total) * 95);
        }
      });

      xhr.addEventListener('load', () => {
        if (xhr.status === 200) {
          entry.progress = 100;
          entry.status = 'done';
          this.totalCount++;
          // Atualizar lista via HTMX
          htmx.ajax('GET', `/projects/${projectId}/sources/list/`, {
            target: '#source-list',
            swap: 'innerHTML',
          });
          setTimeout(() => {
            this.queue = this.queue.filter(u => u.id !== id);
          }, 1500);
        } else {
          entry.status = 'error';
          try {
            entry.error = JSON.parse(xhr.responseText).error || 'Erro no upload';
          } catch {
            entry.error = 'Erro no upload';
          }
        }
      });

      xhr.addEventListener('error', () => {
        entry.status = 'error';
        entry.error = 'Falha na conexão';
      });

      xhr.open('POST', `/projects/${projectId}/sources/upload/`);
      xhr.send(formData);
    },

    getCsrf() {
      const m = document.cookie.match(/csrftoken=([^;]+)/);
      return m ? m[1] : '';
    },

    fmtSize(bytes) {
      const mb = bytes / (1024 * 1024);
      return mb >= 1024 ? (mb / 1024).toFixed(1) + ' GB' : Math.round(mb) + ' MB';
    },
  };
}
</script>
