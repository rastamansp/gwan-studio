# Infraestrutura local para Fase A (PostgreSQL + Redis + MinIO + RabbitMQ + highlight-worker)
# Fase 0 não precisa deste arquivo — só roda: python manage.py runserver 3018
#
# Agrupa TODOS os containers do projeto gwan-studio sob um único `name:` — aparecem
# juntos em `docker ps` / Docker Desktop e sobem/descem com um único comando:
#   docker compose -f docker-compose.dev.yml up -d          # infra (db/redis/minio/rabbitmq)
#   docker compose -f docker-compose.dev.yml --profile worker up -d  # + highlight-worker (GPU, F17)
#   docker compose -f docker-compose.dev.yml down
name: gwan-studio-dev

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studio
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio
    ports:
      - "5451:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6398:6379"  # slot 18 (6380+18) — evita colidir com Redis compartilhado (6379)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9018:9000"  # slot 18 — API S3 (evita colidir com MinIO compartilhado 9000)
      - "9019:9001"  # slot 18 — console (evita colidir com 9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"    # slot 18 — evita colidir com RabbitMQ compartilhado (5672)
      - "15673:15672"  # painel web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Worker GPU da F17 (Whisper + Claude) — opt-in via `--profile worker` (exige --gpus,
  # não roda em máquina sem GPU). Ver apps/ffmpeg-colab/highlight-worker/.
  highlight-worker:
    profiles: ["worker"]
    build:
      context: ../highlight-worker
      dockerfile: Dockerfile
    image: gwan/highlight-worker:local
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=studio
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?defina ANTHROPIC_API_KEY no .env}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-5}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-medium}
    volumes:
      - highlight_work:/app/.work
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pg_data:
  minio_data:
  highlight_work:
