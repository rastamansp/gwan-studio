# Gwan Studio — stack de produção (Portainer).
# Web app Django (Daphne ASGI: HTTP + WebSocket + estáticos via WhiteNoise) + worker Celery.
# Deploy: Portainer UI -> Stacks -> gwan-studio (método Repository). NUNCA via SSH/docker compose up.
#
# Pré-requisitos no servidor:
#   - rede externa gwan-network
#   - Postgres (postgres.gwan.cloud), Redis (cache.gwan.cloud), MinIO (s3.gwan.cloud) compartilhados
#   - DNS A: studio.gwan.cloud -> 187.127.5.72
#   - Variáveis sensíveis preenchidas no Portainer (NÃO commitar segredos aqui)
name: gwan-studio

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gwan/studio-app:latest
    container_name: gwan-studio-app
    restart: unless-stopped
    networks:
      - gwan-network
    env_file:
      - path: .env
        required: false
    # As variáveis abaixo são preenchidas na aba "Environment variables" do Portainer.
    # ATENÇÃO: no Portainer, env vars do stack só fazem substituição ${...} no compose —
    # NÃO entram no container sozinhas. Por isso precisam estar listadas aqui.
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - PORT=3018
      # Obrigatórias (falham o deploy com mensagem clara se não definidas no Portainer):
      - SECRET_KEY=${SECRET_KEY:?defina SECRET_KEY nas Environment variables do Portainer}
      - DATABASE_URL=${DATABASE_URL:?defina DATABASE_URL (postgresql://...) no Portainer}
      # Com default de produção (sobrescreva no Portainer se necessário):
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-studio.gwan.cloud}
      - REDIS_URL=${REDIS_URL:-redis://cache.gwan.cloud:6379/0}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-s3.gwan.cloud}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-studio}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-True}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI:-https://studio.gwan.cloud/api/oauth/youtube/callback/}
      - OAUTH_ENCRYPTION_KEY=${OAUTH_ENCRYPTION_KEY:-}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=gwan-network"
      # Web (HTTP + WebSocket) — studio.gwan.cloud
      - "traefik.http.routers.studio.rule=Host(`${STUDIO_HOST:-studio.gwan.cloud}`)"
      - "traefik.http.routers.studio.entrypoints=websecure"
      - "traefik.http.routers.studio.tls.certresolver=letsencrypt"
      - "traefik.http.services.studio.loadbalancer.server.port=3018"
      # Redirect HTTP -> HTTPS
      - "traefik.http.routers.studio-http.rule=Host(`${STUDIO_HOST:-studio.gwan.cloud}`)"
      - "traefik.http.routers.studio-http.entrypoints=web"
      - "traefik.http.routers.studio-http.middlewares=studio-https-redirect"
      - "traefik.http.middlewares.studio-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.studio-https-redirect.redirectscheme.permanent=true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:3018/api/health/').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Worker Celery (DESABILITADO até o Celery ser conectado) ──────────────
  # O app Celery ainda não existe (falta config/celery.py + import em
  # config/__init__.py + tasks reais; hoje os jobs são mock). Subir este serviço
  # agora geraria crash-loop. Reabilitar quando a fila estiver implementada (Fase A).
  #
  # celery-worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   image: gwan/studio-app:latest
  #   container_name: gwan-studio-worker
  #   restart: unless-stopped
  #   command: celery -A config worker --loglevel=info --concurrency=2
  #   networks:
  #     - gwan-network
  #   env_file:
  #     - path: .env
  #       required: false
  #   environment:  # repetir o mesmo bloco environment do serviço app (SECRET_KEY, DATABASE_URL, REDIS_URL, etc.)
  #     - DJANGO_SETTINGS_MODULE=config.settings.production
  #     - SECRET_KEY=${SECRET_KEY:?}
  #     - DATABASE_URL=${DATABASE_URL:?}
  #     - REDIS_URL=${REDIS_URL:-redis://cache.gwan.cloud:6379/0}
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

networks:
  gwan-network:
    external: true
    name: gwan-network
